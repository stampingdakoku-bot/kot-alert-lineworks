<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - KoT Alert</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .login-box { background: white; border-radius: 8px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 320px; text-align: center; }
        .login-box h1 { font-size: 20px; color: #2c3e50; margin-bottom: 8px; }
        .login-box p { font-size: 13px; color: #999; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 24px; text-align: center; letter-spacing: 8px; margin-bottom: 16px; min-height: 52px; }
        .login-box input:focus { outline: none; border-color: #3498db; }
        .login-box button { width: 100%; padding: 14px; background: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; min-height: 48px; }
        .login-box button:hover { background: #2980b9; }
        .flash { padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>KoT Alert</h1>
        <p>パスコードを入力してください</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endwith %}
        <form method="POST">
            <input type="password" name="passcode" maxlength="6" pattern="[0-9]*" inputmode="numeric" autofocus required>
            <button type="submit">ログイン</button>
        </form>
    </div>
</body>
</html>
